<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Testable Todo Item Card</title>
  <style>
    /* ========== RESET & GLOBAL ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #e9eff7 0%, #dce3ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    /* card container – responsive + accessible */
    .demo-container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    /* ========== TODO CARD (article) ========== */
    .todo-card {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
      padding: 1.5rem;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(0px);
    }

    /* Responsive: full-width on mobile, comfy max-width on desktop */
    @media (max-width: 640px) {
      .todo-card {
        padding: 1.25rem;
        border-radius: 28px;
      }

      body {
        padding: 1rem;
      }
    }

    /* focus styles - WCAG visible outline */
    button:focus-visible,
    input:focus-visible,
    .edit-btn:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    .delete-btn:focus-visible {
      outline: 3px solid #1e6fdf;
      outline-offset: 3px;
      border-radius: 12px;
    }

    /* card header: title & top row */
    .card-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .title-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      max-width: 100%;
      word-wrap: break-word;
    }

    .todo-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1a2a3f, #1e3a5f);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      transition: text-decoration 0.2s, color 0.2s;
    }

    /* strike-through when completed */
    .todo-title.completed-title {
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: #2c7da0;
      color: #6c757d;
      background: none;
      background-clip: unset;
      -webkit-background-clip: unset;
      color: #6c757d;
    }

    /* priority badge */
    .priority-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f0f2f5;
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .priority-high {
      background: #ffe8e6;
      color: #bc2c1e;
      border-left: 3px solid #e03a1c;
    }

    .priority-medium {
      background: #fff0db;
      color: #c96f0e;
      border-left: 3px solid #f4a261;
    }

    .priority-low {
      background: #e6f4ea;
      color: #2b6e3c;
      border-left: 3px solid #2e7d32;
    }

    /* description */
    .todo-description {
      font-size: 1rem;
      line-height: 1.45;
      color: #2c3e44;
      margin: 0.75rem 0 1rem 0;
      background: #f8fafc;
      padding: 0.85rem 1rem;
      border-radius: 20px;
      border: 1px solid #e9edf2;
    }

    /* meta row: due date + status + time remaining */
    .meta-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.25rem;
      align-items: center;
      background: #f9fbfd;
      padding: 0.8rem 1rem;
      border-radius: 24px;
    }

    .due-block {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .due-label {
      font-weight: 600;
      color: #1f3b4c;
      font-size: 0.85rem;
    }

    time {
      font-weight: 500;
      background: #eef2f6;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      font-size: 0.85rem;
    }

    .status-badge {
      background: #e2eafc;
      padding: 0.25rem 0.9rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1f6392;
    }

    .status-done {
      background: #d4e6d9;
      color: #1c6e3c;
    }

    .time-remaining-box {
      background: #eef2fa;
      padding: 0.25rem 0.9rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* tags list */
    .tags-section {
      margin: 1rem 0 1.25rem 0;
    }

    .tags-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #5b6f82;
      margin-bottom: 0.6rem;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      list-style: none;
    }

    .tag-chip {
      background: #eef2ff;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #1e4663;
      transition: all 0.1s;
      border: 1px solid #cddfe7;
    }

    /* checkbox row */
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1rem 0 1.2rem 0;
      padding: 0.5rem 0;
      border-top: 1px solid #e2e8f0;
      border-bottom: 1px solid #e2e8f0;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-weight: 500;
      color: #1f2f3e;
    }

    input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      cursor: pointer;
      accent-color: #2c7da0;
    }

    /* action buttons group */
    .action-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    button {
      background: none;
      border: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .edit-btn {
      background: #ecf3fa;
      color: #1f6392;
      border: 1px solid #cddfe7;
    }

    .edit-btn:hover {
      background: #dce7f2;
      transform: scale(0.97);
    }

    .delete-btn {
      background: #fee9e7;
      color: #bc2c1e;
      border: 1px solid #ffcdc7;
    }

    .delete-btn:hover {
      background: #fdd8d4;
    }

    /* aria-live region for time remaining (polite) */
    [aria-live="polite"] {
      display: contents;
    }

    /* responsive stacking fine tuning */
    @media (max-width: 480px) {
      .meta-grid {
        flex-direction: column;
        align-items: flex-start;
      }

      .action-buttons {
        justify-content: stretch;
      }

      button {
        flex: 1;
        justify-content: center;
      }

      .todo-title {
        font-size: 1.4rem;
      }
    }



    /* editformcss */
    #edit-form-div {
      flex-direction: column;
      /* display: none; */
    }

    #edit-form-description {
      height: 5rem;
    }

    #edit-form-priority {
      height: 2rem;
      width: 7rem;

    }

    #for-overdue {
      color: rgb(180, 0, 0);
      background-color: lightcoral;
    }

    .edit-form-inputs {
      width: 100%;
      border-radius: 0.9rem;
      min-height: 2rem;
      padding: 0 1rem;

    }


    .edit-input-div {
      margin-bottom: 0.5rem;
    }

    .edit-mode-heading {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .edit-save-cancel {
      padding: 0.5rem 2rem;
      margin: 0 1rem;
    }

    .edit-save-cancel:hover {
      opacity: 0.5;
    }

    .edit-form-save-btn {
      background-color: rgb(6, 153, 153);
      color: white;
    }

    .edit-form-inputs {
      margin-top: 0.4rem;
    }

    .edit-form-bottom-btn {
      display: flex;
      justify-content: flex-end;
    }

    .edit-form-cancel-btn {
      background-color: rgb(139, 129, 129);
      color: white;
    }



    /* display div container */

    #status-select {
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
    }

    .status-select-label {
      font-weight: 600;
    }

    .medium-orange {
      border-left: 1rem solid orange;
    }


    .low-green {
      border-left: 1rem solid green;
    }

    .high-red {
      border-left: 1rem solid red;
    }

    .completed {
      opacity: 0.5;
    }

    #todo-title-text {
      max-width: 100%;
    }

    /* collapse and expand */

    #text {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    /* Collapsed: show only 2 lines */
    .collapsed {
      -webkit-line-clamp: 2;
      word-wrap: break-word;
      width: 100%;
    }

    /* Expanded: show everything */
    .expanded {
      -webkit-line-clamp: unset;
    }

    #toggleBtn {
      background-color: lightskyblue;
      font-size: 0.8rem;
      padding: 0.3rem 0.7rem;
      margin-left: auto;
    }

    .toggleBtndiv {
      display: flex;
    }
  </style>
  <!-- <link rel="stylesheet" href="editForm.css"> -->
</head>

<body>
  <div class="demo-container">

    <article class="todo-card" data-testid="test-todo-card" role="region" aria-label="Todo task card">
      <!-- header: title + priority badge -->

      <!-- This container is for the display content only -->
      <div id="display-container-div">
        <div class="card-header">
          <div class="title-wrapper">
            <h2 class="todo-title" id="todo-title-text" data-testid="test-todo-title">Design System Research</h2>
          </div>
          <div data-testid="test-todo-priority-indicator" class="priority-badge priority-medium" id="priorityBadge"
            aria-label="Priority level">
            <span data-testid="test-todo-priority"> Medium</span>
          </div>
        </div>
        <!-- Checkbox for completion toggle -->
        <div class="checkbox-row">
          <label class="checkbox-label" for="completeToggle">
            <input type="checkbox" id="completeToggle" data-testid="test-todo-complete-toggle"
              aria-describedby="todo-title-text" />
            <span>Mark as completed</span>
          </label>
        </div>
        <!-- status control -->

        <div class="status-section-control">
          <label for="status-select" class="status-select-label">Change status:</label>
          <select name="" id="status-select" data-testid="test-todo-status-control">
            <option value="Pending">Pending</option>
            <option value="In progress">In progress</option>
            <option value="Done">Done</option>
          </select>
        </div>

        <!-- Description paragraph -->
        <div data-testid="test-todo-description">
          <p class="todo-description collapsed" data-testid="test-todo-collapsible-section" id="text">
            Analyze component libraries, gather accessibility insights, and prepare draft for the new design tokens.

          </p>
        </div>
        <div class="toggleBtndiv">
          <button id="toggleBtn" data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="text">Read
            more</button>

        </div>

        <!-- Due date & time remaining & status row -->
        <div class="meta-grid">
          <div class="due-block">
            <span class="due-label">Due:</span>
            <!-- time element with datetime attribute -->
            <time datetime="2026-03-01T18:00:00+00:00" data-testid="test-todo-due-date" id="dueDateElem">March 1, 2026,
              6:00 PM UTC</time>
          </div>
          <div>
            <span class="status-badge" id="statusBadge" data-testid="test-todo-status"> Pending</span>
          </div>
          <div>
            <!-- time remaining container with live polite announcement (optional live region) -->
            <span class="time-remaining-box" id="timeRemainingBox" data-testid="test-todo-time-remaining"
              aria-live="polite">
              Calculating...
            </span>
          </div>
          <div>
            <span id="for-overdue" class="status-badge" data-testid="test-todo-overdue-indicator">Overdue</span>
          </div>
        </div>



        <!-- Tags / categories list (chips) -->
        <div class="tags-section">
          <div class="tags-title" id="tagsLabel">Categories & Tags</div>
          <ul class="tag-list" role="list" aria-labelledby="tagsLabel" data-testid="test-todo-tags">
            <li class="tag-chip" data-testid="test-todo-tag-work"> Work</li>
            <li class="tag-chip" data-testid="test-todo-tag-urgent"> Urgent</li>
            <li class="tag-chip"> Design</li>
          </ul>
        </div>



        <!-- Edit & Delete Buttons -->
        <div class="action-buttons">
          <button class="edit-btn" data-testid="test-todo-edit-button" aria-label="Edit task"> Edit</button>
          <button class="delete-btn" data-testid="test-todo-delete-button" aria-label="Delete task"> Delete</button>
        </div>
      </div>

      <!-- The below div is for the edit form -->
      <div id="edit-form-div" data-testid="test-todo-edit-form">
        <div class="edit-mode-heading">
          <h2>Edit Mode</h2>
        </div>
        <div class="edit-input-div">
          <label for="edit-title-input">
            Title:
          </label>
          <input type="text" id="edit-title-input" class="edit-form-inputs" data-testid="test-todo-edit-title-input">
        </div>
        <div class="edit-input-div">
          <label for="edit-form-description">Description:</label>
          <textarea id="edit-form-description" data-testid="test-todo-edit-description-input" rows="3"
            class="edit-form-inputs"></textarea>
        </div>
        <div class="edit-input-div">
          <label for="edit-form-priority">Priority:</label>
          <select name="priority" id="edit-form-priority" data-testid="test-todo-edit-priority-select"
            class="edit-form-inputs">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="edit-input-div">
          <label for="edit-form-date">
            Due date & time
          </label>
          <input data-testid="test-todo-edit-due-date-input" type="datetime-local" name="date" id="edit-form-date"
            class="edit-form-inputs">
        </div>
        <div class="edit-form-bottom-btn">
          <button class="edit-form-save-btn edit-save-cancel" data-testid="test-todo-save-button">
            Save
          </button>
          <button data-testid="test-todo-cancel-button" class="edit-form-cancel-btn edit-save-cancel">
            Cancel
          </button>
        </div>
      </div>
    </article>
  </div>

  <script>
    (function () {

      const DUE_DATE_ISO = "2026-03-01T18:00:00Z";
      const dueDateUTC = new Date(DUE_DATE_ISO);

      const dueDateElem = document.getElementById('dueDateElem');
      const timeRemainingSpan = document.getElementById('timeRemainingBox');
      const statusBadge = document.getElementById('statusBadge');
      const todoTitleElem = document.querySelector('[data-testid="test-todo-title"]');
      const todoDescription = document.querySelector(".todo-description");
      const priorityBadge = document.getElementById('priorityBadge');
      const completeCheckbox = document.getElementById('completeToggle');
      const statusSelect = document.getElementById("status-select");
      const overdueTag = document.getElementById("for-overdue")
      // added for edit mode
      const displayContainerDiv = document.getElementById("display-container-div");
      const editFormDiv = document.getElementById("edit-form-div");
      const editFormCancel = document.querySelector(".edit-form-cancel-btn");

      const saveBtn = document.querySelector(".edit-form-save-btn");

      const editBtn = document.querySelector('[data-testid="test-todo-edit-button"]');
      const deleteBtn = document.querySelector('[data-testid="test-todo-delete-button"]');


      let intervalId;
      let state = {
        title: "Design System Research",
        description: "Analyze component libraries, gather accessibility insights, and prepare draft for the new design tokens.",
        priority: "Medium",      // Low, Medium, High
        dueDateUTC: "2026-03-01T18:00:00Z",  // ISO string UTC
        status: "Pending",   // Pending, In Progress, Done
        completed: false         // derived from checkbox / status sync
      };

      let editModeActive = false;
      // setting edit form to none by default
      function toggleEditMode(isFirstTime = false) {
        if (!editModeActive) {
          editFormDiv.style.display = "none";
          displayContainerDiv.style.display = "block";
          if (!isFirstTime) {
            editBtn.focus();
          }



        } else {
          displayContainerDiv.style.display = "none"
          editFormDiv.style.display = "flex";
        }
        editModeActive = !editModeActive;
      }
      toggleEditMode(true)

      // edit form inputs 
      const editTitleInput = document.getElementById("edit-title-input");
      const editDescriptionInput = document.getElementById("edit-form-description");
      const priorityInput = document.getElementById("edit-form-priority");
      const dateInput = document.getElementById("edit-form-date");


      // priority color
      const todoCard = document.querySelector(".todo-card");

      function priorityStyles() {
        if (state.priority == "Medium") {

          todoCard.classList.add("medium-orange")
          todoCard.classList.remove("low-green")
          todoCard.classList.remove("high-red")
        } else if (state.priority == "Low") {
          console.log("ddj")
          todoCard.classList.remove("medium-orange")
          todoCard.classList.add("low-green")
          todoCard.classList.remove("high-red")
        } else {
          todoCard.classList.remove("medium-orange")
          todoCard.classList.remove("low-green")
          todoCard.classList.add("high-red")
        }
      }
      priorityStyles()

      // function formatDueDate() {
      //   const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' };
      //   return state.dueDateUTC.toLocaleDateString(undefined, options);
      // }

      function computeTimeRemaining() {
        const now = new Date();
        const due = new Date(state.dueDateUTC);
        const diffMs = due - now;
        const isOverdue = diffMs < 0;
        const absDiff = Math.abs(diffMs);

        const seconds = Math.floor(absDiff / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);
        const remainingHours = hours % 24;
        const remainingMinutes = minutes % 60;

        if (isOverdue) {
          if (days > 0) {
            return `Overdue by ${days} day${days !== 1 ? 's' : ''}`;
          } else if (hours > 0) {
            return `Overdue by ${hours} hour${hours !== 1 ? 's' : ''}`;
          } else if (minutes > 0) {
            return `Overdue by ${minutes} minute${minutes !== 1 ? 's' : ''}`;
          } else {
            return `Overdue just now`;
          }
        } else {
          if (days > 2) {
            return `Due in ${days} days`;
          } else if (days === 2) {
            return `Due in 2 days`;
          } else if (days === 1) {
            return `Due tomorrow`;
          } else if (hours >= 1) {
            return `Due in ${hours} hour${hours !== 1 ? 's' : ''}`;
          } else if (minutes >= 1) {
            return `Due in ${minutes} minute${minutes !== 1 ? 's' : ''}`;
          } else {
            return `Due now!`;
          }
        }
      }

      function updateTimeRemainingDisplay() {
        if (timeRemainingSpan) {
          const remainingText = computeTimeRemaining();
          timeRemainingSpan.textContent = ` ${remainingText}`;
        }
      }


      function setDueDateText() {
        if (dueDateElem) {
          dueDateElem.textContent = formatDueDate(state.dueDateUTC);
        }
      }

      function updateCardCompletion(isChecked) {

        if (todoTitleElem) {
          if (isChecked) {
            todoTitleElem.classList.add('completed-title');
            statusSelect.value = "Done";
            state.status = "Done";
            todoCard.classList.add("completed");

            if (intervalId) {
              console.log(intervalId)
              clearInterval(intervalId);
            }

          } else {
            todoTitleElem.classList.remove('completed-title');
            statusSelect.value = "Pending";
            state.status = "Pending";
            todoCard.classList.remove("completed")
            intervalId = setInterval(() => {
              updateTimeRemainingDisplay();
            }, 45000);
            console.log(intervalId)

          }
        }
        if (statusBadge) {
          if (isChecked) {
            statusBadge.innerHTML = ' Done';
            statusBadge.classList.add('status-done');
            timeRemainingSpan.textContent = "Completed";
            timeRemainingSpan.style.color = "green"
          } else {
            statusBadge.innerHTML = 'Pending';
            statusBadge.classList.remove('status-done');
            // timeRemainingSpan.style.display = "block";
            timeRemainingSpan.style.color = "black"
            updateTimeRemainingDisplay()


          }
        }

      }
      // overdue logic
      function toggleOverdue() {
        const now = new Date();
        const due = new Date(state.dueDateUTC);
        const diffMs = due - now;
        const isOverdue = diffMs < 0;
        if (isOverdue) {
          overdueTag.style.display = "block";
        } else {
          overdueTag.style.display = "none"
        }
      }
      toggleOverdue()

      function onCheckboxToggle(e) {
        const isCompleted = completeCheckbox.checked;
        updateCardCompletion(isCompleted);
      }


      // helper: convert UTC iso to local datetime-local string
      function utcToLocalDatetimeLocal(isoString) {
        const d = new Date(isoString);
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const hours = String(d.getHours()).padStart(2, '0');
        const minutes = String(d.getMinutes()).padStart(2, '0');
        return `${year}-${month}-${day}T${hours}:${minutes}`;
      }

      // local datetime to UTC ISO string (assumes user local)
      function localDatetimeToUTC(localValue) {
        if (!localValue) return new Date().toISOString();
        const localDate = new Date(localValue);
        return localDate.toISOString();
      }

      // format due date for display
      function formatDueDate(isoUTC) {
        const d = new Date(isoUTC);
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }

      if (editBtn) {
        editBtn.addEventListener('click', () => {
          toggleEditMode();
          editTitleInput.value = state.title;
          editDescriptionInput.value = state.description;
          priorityInput.value = state.priority;
          const localvalue = utcToLocalDatetimeLocal(state.dueDateUTC)
          dateInput.value = localvalue;
          console.log(localvalue)
          console.log("You clicked edit");
        });
      }
      if (deleteBtn) {
        deleteBtn.addEventListener('click', () => {
          console.log("delete clicked — remove card");
          alert("You clicked delete");
        });
      }

      setDueDateText();
      updateTimeRemainingDisplay();
      completeCheckbox.checked = false;
      updateCardCompletion(false);

      completeCheckbox.addEventListener('change', onCheckboxToggle);
      // for when a new option is selected in the select dropdown
      statusSelect.addEventListener("change", (e) => {
        if (e.target.value == "Done") {
          updateCardCompletion(true);
          completeCheckbox.checked = true;
          state.status = "Done"
          todoCard.classList.add("completed");
          // console.log(intervalId)
          // clearInterval(intervalId)


        } else {
          completeCheckbox.checked = false;
          todoCard.classList.remove("completed")
          statusBadge.innerHTML = e.target.value;
          state.status = e.target.value;
          todoTitleElem.classList.remove('completed-title');
          statusBadge.classList.remove('status-done');
          // timeRemainingSpan.style.display = "block";
          updateTimeRemainingDisplay()
          timeRemainingSpan.style.color = "black";
          intervalId = setInterval(() => {
            updateTimeRemainingDisplay();
          }, 45000);
          console.log(intervalId)

        }
      })

      saveBtn.addEventListener("click", () => {
        state.title = editTitleInput.value;
        state.description = editDescriptionInput.value;
        state.dueDateUTC = localDatetimeToUTC(dateInput.value);
        state.priority = priorityInput.value;
        console.log(state.dueDateUTC)


        todoTitleElem.innerHTML = state.title;
        todoDescription.innerHTML = state.description;
        dueDateElem.innerHTML = formatDueDate(dateInput.value);
        priorityBadge.innerHTML = state.priority;
        if (state.priority == "High") {
          priorityBadge.style.backgroundColor = "lightcoral"
          priorityBadge.style.color = "darkred";
          priorityBadge.style.borderLeft = "3px solid red";
        } else if (state.priority == "Low") {
          priorityBadge.style.backgroundColor = "lightgreen"
          priorityBadge.style.color = "green";
          priorityBadge.style.borderLeft = "3px solid green";
        } else {
          priorityBadge.style.backgroundColor = "#fff0db"
          priorityBadge.style.color = "#c96f0e";
          priorityBadge.style.borderLeft = "3px solid #f4a261";
        }
        toggleEditMode()
        priorityStyles()
        state.status = "Pending";
        statusBadge.innerHTML = state.status;
        statusSelect.value = state.status;
        updateTimeRemainingDisplay()
        toggleOverdue();
      })

      intervalId = setInterval(() => {
        updateTimeRemainingDisplay();
      }, 45000);


      window.addEventListener('focus', () => {
        updateTimeRemainingDisplay();
      });


      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          updateTimeRemainingDisplay();
        }
      });

      setTimeout(() => {
        updateTimeRemainingDisplay();
      }, 100);
      console.log("Todo card ready, time remaining updates every 45 seconds.");


      // Edit mode code starts here

      editFormCancel.addEventListener("click", () => {
        toggleEditMode();
      })


      // collapse and expand
      const text = document.getElementById("text");
      const btn = document.getElementById("toggleBtn");
      btn.addEventListener("click", () => {
        // const isCollapsed = text.classList.contains("collapsed");
        const isExpanded = btn.getAttribute("aria-expanded") === "true";
        btn.setAttribute("aria-expanded", String(!isExpanded));

        text.classList.toggle("collapsed");
        text.classList.toggle("expanded");

        btn.textContent = isExpanded ? "Read more" : "Read less";
      });

    })();
  </script>
</body>

</html>
